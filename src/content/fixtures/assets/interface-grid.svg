<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="title description">
  <title id="title">Synthetic interface grid</title>
  <desc id="description">A geometric fixture with three outlined regions and no real interface content.</desc>
  <rect width="640" height="360" fill="#f4f0e8"/>
  <g fill="none" stroke="#2c342f" stroke-width="8">
    <rect x="32" y="32" width="576" height="64"/>
    <rect x="32" y="120" width="176" height="208"/>
    <rect x="232" y="120" width="376" height="208"/>
  </g>
</svg>
